<style>
.step-btn { padding:6px 14px; border-radius:20px; border:1px solid var(--color-border-secondary); background:var(--color-background-secondary); color:var(--color-text-secondary); font-size:12px; cursor:pointer; transition:all .2s; }
.step-btn.active { background:var(--color-background-primary); border-color:var(--color-border-primary); color:var(--color-text-primary); font-weight:500; }
.card { background:var(--color-background-secondary); border:1px solid var(--color-border-tertiary); border-radius:12px; padding:20px 24px; }
.card-label { font-size:11px; font-weight:500; color:var(--color-text-tertiary); text-transform:uppercase; letter-spacing:.06em; margin-bottom:6px; }
.card-title { font-size:15px; font-weight:500; color:var(--color-text-primary); margin-bottom:10px; }
.card-body { font-size:13px; color:var(--color-text-secondary); line-height:1.65; margin-bottom:14px; }
.feature-tag { display:inline-block; padding:3px 10px; border-radius:12px; font-size:11px; font-weight:500; margin:3px 3px 3px 0; background:var(--color-background-primary); border:1px solid var(--color-border-secondary); color:var(--color-text-secondary); }
.ai-bubble { background:var(--color-background-primary); border-left:3px solid #7F77DD; border-radius:0 8px 8px 0; padding:10px 14px; margin-top:12px; font-size:12px; color:var(--color-text-secondary); font-style:italic; line-height:1.6; }
.insight { background:var(--color-background-primary); border:1px solid var(--color-border-tertiary); border-radius:8px; padding:10px 14px; margin-top:10px; font-size:12px; color:var(--color-text-secondary); line-height:1.6; }
.insight-label { font-size:10px; font-weight:500; color:var(--color-text-tertiary); text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px; }
.prog-dot { width:8px; height:8px; border-radius:50%; background:var(--color-border-secondary); transition:background .3s; display:inline-block; }
.prog-dot.done { background:#1D9E75; }
.prog-dot.active { background:#7F77DD; }
.month-row { display:flex; justify-content:space-between; align-items:center; font-size:12px; padding:5px 0; border-bottom:1px solid var(--color-border-tertiary); color:var(--color-text-secondary); }
.month-row:last-child { border-bottom:none; }
.bar-wrap { flex:1; margin:0 12px; height:6px; background:var(--color-border-tertiary); border-radius:3px; overflow:hidden; }
.bar-fill { height:100%; border-radius:3px; }
</style>

<div style="padding:4px 0 0">
<div style="display:flex;gap:8px;margin-bottom:12px;" id="prog"></div>
<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;" id="nav"></div>
<div id="content"></div>
<div style="display:flex;gap:10px;margin-top:16px;">
  <button onclick="prev()" style="flex:1;padding:9px;border-radius:8px;border:1px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-secondary);font-size:13px;cursor:pointer;">Önceki</button>
  <button onclick="next()" id="btn-next" style="flex:1;padding:9px;border-radius:8px;border:1px solid var(--color-border-primary);background:var(--color-background-secondary);color:var(--color-text-primary);font-size:13px;cursor:pointer;font-weight:500;">Sonraki</button>
</div>
</div>

<script>
const steps = [
  {
    label: "Durum",
    title: "Selin, 31 — gelir var ama düzensiz",
    body: "Grafik tasarımcı, serbest çalışıyor. Kimi ay 70.000₺ kazanıyor, kimi ay 18.000₺. Ortalama iyi görünüyor ama 'iyi ay' geliyor, yüksek harcama başlıyor — 'kötü ay' geldiğinde pişmanlık başlıyor. Sabit giderleri var: kira 12.000₺, yazılım abonelikleri 2.400₺, sağlık sigortası 1.800₺. Mart ve Ekim'de vergi beyannamesi dönemi geliyor, her seferinde panikliyor çünkü para ayırmamış. Uygulamayı indiriyor çünkü muhasebecisi 'bir şekilde takip et' dedi.",
    features: [],
    ai: null,
    insight: null
  },
  {
    label: "PDF yükleme",
    title: "6 aylık ekstreler — dalgalı tablo",
    body: "Selin son 6 ayın ekstresini yüklüyor. AI gelirin ne kadar dalgalandığını görselleştiriyor. Selin bunu zaten biliyordu ama rakamlarla görmek farklı hissettiriyor — özellikle 'iyi ay'larda ne kadar fazla harcadığını görünce.",
    features: ["PDF ekstresi okuma", "Nakit akışı görselleştirmesi"],
    ai: null,
    insight: {
      label: "Son 6 ay — gelir dalgası",
      text: `<div class="month-row"><span style="min-width:50px">Ocak</span><div class="bar-wrap"><div class="bar-fill" style="width:38%;background:#1D9E75"></div></div><span>22.000₺</span></div>
<div class="month-row"><span style="min-width:50px">Şubat</span><div class="bar-wrap"><div class="bar-fill" style="width:100%;background:#1D9E75"></div></div><span>58.000₺</span></div>
<div class="month-row"><span style="min-width:50px">Mart</span><div class="bar-wrap"><div class="bar-fill" style="width:28%;background:#A32D2D"></div></div><span>16.000₺</span></div>
<div class="month-row"><span style="min-width:50px">Nisan</span><div class="bar-wrap"><div class="bar-fill" style="width:72%;background:#1D9E75"></div></div><span>42.000₺</span></div>
<div class="month-row"><span style="min-width:50px">Mayıs</span><div class="bar-wrap"><div class="bar-fill" style="width:55%;background:#1D9E75"></div></div><span>32.000₺</span></div>
<div class="month-row"><span style="min-width:50px">Haziran</span><div class="bar-wrap"><div class="bar-fill" style="width:22%;background:#A32D2D"></div></div><span>13.000₺</span></div>`
    }
  },
  {
    label: "Şok an",
    title: "'İyi ay' masalı",
    body: "Şubat'ta 58.000₺ kazandı — harika bir ay. Ama AI harcama verisine bakıyor ve Şubat'ta ne harcandığını da görüyor. Selin'in 'iyi ay psikolojisi' rakamlarla karşı karşıya geliyor.",
    features: ["Nakit akışı görselleştirmesi"],
    ai: "Şubat'ta 58.000₺ kazandın ve 51.000₺ harcadın. Harcamaların %40'ı o ay yaptığın tek seferlik alışverişler — laptop, kurs, mobilya. Gelir yüksekti, harcama da yükseldi. Mart'ta gelir 16.000₺'ye düştü ama alışkanlıklar aynı kaldı — o ay 4.200₺ açık verdin.",
    insight: null
  },
  {
    label: "Sabit gider kalkanı",
    title: "Önce sabit giderler ayrılıyor",
    body: "Selin'in en büyük problemi şu: iyi ayda para gelince 'kullanılabilir' gibi hissettiriyor ama aslında bir kısmı sonraki kötü aya ait. ParaPusula her ay gelir girince önce sabit giderleri ve vergi karşılığını ayırıyor, geri kalanı 'gerçekten kullanılabilir' para olarak gösteriyor.",
    features: ["Nakit akışı görselleştirmesi", "Bu ay ne yapmalıyım?"],
    ai: "Şubat'ta 58.000₺ geldi. Sabit giderlerin 16.200₺, vergi karşılığı (%20 olarak ayıralım) 11.600₺, 3 aylık acil fon payı 5.000₺. Geriye kalan 25.200₺ — bunun üzerinde özgürce karar verebilirsin.",
    insight: null
  },
  {
    label: "Vergi simülasyonu",
    title: "Mart paniği bitmeden önce",
    body: "Ocak ayında Selin asistana yazıyor: 'Mart'ta vergi beyannamem var, ne kadar ayırmalıyım?' AI son 6 ayın gelirine bakıyor ve tahmini vergi yükünü hesaplıyor — muhasebeci gibi değil, basit ve net.",
    features: ["Yapay zeka sohbet asistanı", "Senaryo simülatörü"],
    ai: "Son 6 ayda toplam 183.000₺ kazandın. Basit usul vergi tahminine göre yaklaşık 28.000-34.000₺ arasında vergi çıkabilir — kesin rakam için muhasebecine danış ama şimdiden bu aralığı kenara koy. Her ay gelirinin %20'sini 'vergi hesabı' diye ayrı tutarsan bir daha sürpriz yaşamazsın.",
    insight: null
  },
  {
    label: "Kötü ay planı",
    title: "'Bu ay müşteri yoksa ne yaparım?'",
    body: "Haziran geldi, iş az. Selin asistana soruyor: 'Bu ay sadece 13.000₺ kazandım, önce ne ödemeliyim?' AI onun sabit giderlerini biliyor, vergi karşılığı birikimini biliyor — ona öncelik sırası çıkarıyor.",
    features: ["Yapay zeka sohbet asistanı", "Bu ay ne yapmalıyım?"],
    ai: "13.000₺ ile: önce kirayı öde (12.000₺), sağlık sigortasını öde (1.800₺) — bu ay 800₺ açık veriyorsun. Yazılım aboneliklerinden 2'sini bu ay durdur (Figma'yı koru, diğerlerini ertele). Vergi birikimine bu ay ekleme yapma, sadece koruma. Geçen iyi aylardan biriktirdiğin 8.400₺ acil fon bu an için vardı.",
    insight: null
  },
  {
    label: "6 ay sonra",
    title: "Düzensiz gelir artık yönetilebilir",
    body: "6 ay boyunca her ay ekstresini yükledi. 'İyi ay harca, kötü ay paniyle' döngüsü kırılmaya başladı. Vergi için 22.000₺ birikti. Acil fon 3 aylık sabit gideri karşılıyor. Selin artık Mart'tan korkmuyur.",
    features: ["Aylık özet raporu", "Finansal sağlık skoru"],
    ai: "6 ay önce kötü ay gelince paniğe giriyordun. Şimdi 3 aylık tampon fonun var, vergi birikimin hazır. Gelirin hâlâ dalgalı — ama artık bu bir kriz değil, sadece serbest çalışmanın doğası.",
    insight: null
  }
];

let cur = 0;

function render() {
  const s = steps[cur];
  document.getElementById('nav').innerHTML = steps.map((st,i) =>
    `<button class="step-btn ${i===cur?'active':''}" onclick="go(${i})">${st.label}</button>`
  ).join('');
  document.getElementById('prog').innerHTML = steps.map((_,i) =>
    `<div class="prog-dot ${i<cur?'done':i===cur?'active':''}"></div>`
  ).join('');

  let html = `<div class="card">
    <div class="card-label">Adım ${cur+1} / ${steps.length}</div>
    <div class="card-title">${s.title}</div>
    <div class="card-body">${s.body}</div>`;

  if (s.features.length) {
    html += `<div style="margin-bottom:10px;">${s.features.map(f=>`<span class="feature-tag">${f}</span>`).join('')}</div>`;
  }
  if (s.ai) {
    html += `<div class="ai-bubble">${s.ai.replace(/\n/g,'<br>')}</div>`;
  }
  if (s.insight) {
    html += `<div class="insight"><div class="insight-label">${s.insight.label}</div>${s.insight.text}</div>`;
  }

  html += `</div>`;
  document.getElementById('content').innerHTML = html;
  document.getElementById('btn-next').textContent = cur === steps.length-1 ? 'Başa dön' : 'Sonraki';
}

function go(i) { cur=i; render(); }
function next() { cur = cur<steps.length-1 ? cur+1 : 0; render(); }
function prev() { if(cur>0){cur--;render();} }

render();
</script>
